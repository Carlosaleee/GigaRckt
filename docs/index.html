<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giga Rckt Eventos</title>
  <link rel="stylesheet" href="styles.css?v=1.3">

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("czP7X2q2P366EBru0");
    })();
  </script>
  <script src="data.js"></script>
</head>

<body>

  <header class="navbar">
    <div class="nav-container">

      <div class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu">
        ☰
      </div>

      <nav class="nav-menu" id="main-nav" aria-label="Seções da apresentação">
        <!-- preenchido por script.js a partir de data.js -->
      </nav>

    </div>
  </header>

  <main id="main-sections" aria-live="polite">
    <!-- seções renderizadas por script.js -->
  </main>

  <footer class="footer-nav">

    <nav class="footer-menu" id="footer-social" aria-label="Redes e contato">
      <!-- preenchido por script.js -->
    </nav>

    <div class="footer-divider"></div>

    <div class="footer-contact-form">
      <h3>Solicite um Orçamento</h3>
      <form id="lead-form">
        <div class="form-group">
          <input type="text" name="empresa" placeholder="Nome da Empresa" required autocomplete="organization">
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="E-mail Corporativo" required autocomplete="email">
        </div>
        <div class="form-group">
          <input type="tel" name="telefone" placeholder="Telefone / WhatsApp" required autocomplete="tel">
        </div>

        <div class="event-selection">
          <p>Qual tipo de evento você deseja?</p>
          <div class="cards-container" id="event-type-cards">
            <!-- radios gerados por script.js -->
          </div>
        </div>

        <button type="submit" class="btn-submit">Enviar Proposta</button>
      </form>
    </div>

    <div class="footer-divider"></div>

    <div class="footer-creditos" id="footer-credits">
      <!-- preenchido por script.js -->
    </div>

  </footer>

  <div class="back-to-top" onclick="scrollToTop()" aria-label="Voltar ao topo">↑</div>

  <script src="script.js"></script>
</body>

</html>
